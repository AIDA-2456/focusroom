<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/brain.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="FocusRoom - Distraction-free learning for ADHD students. Break content into focus-sized chunks." />
    <meta name="keywords" content="ADHD, focus, learning, study, education, accessibility" />
    <meta name="theme-color" content="#6366f1" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="FocusRoom - Focus Made Simple" />

    <title>FocusRoom - Focus Made Simple</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>
      /* Prevent flash of unstyled content */
      body {
        margin: 0;
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
        background: #0B0B13;
        color: #ffffff;
      }
      #root {
        min-height: 100vh;
      }
      /* Loading screen */
      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-size: 1.5rem;
        color: #6366f1;
      }

    <div id="root">
      <div class="loading">

    </div>
